spring.application.name=basic-crud-spring-boot

# MySQL: install/start server, then set user/password below or via env (MYSQL_USER, MYSQL_PASSWORD).
# JDBC URL creates database "basic_crud" if it does not exist (MySQL 8+).
spring.datasource.url=jdbc:mysql://localhost:3306/basic_crud?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
# If the database already has tables but no flyway_schema_history (e.g. after using ddl-auto), Flyway baselines then applies pending scripts.
spring.flyway.baseline-on-migrate=true

server.port=8080

# JWT (use a long random JWT_SECRET in production; value is hashed to a 256-bit signing key)
app.jwt.secret=${JWT_SECRET:dev-change-me-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Next.js default dev server; comma-separated for multiple origins
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
